<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automation Ecosystem</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f8fafc, #eaf2ff);
        color: #0f172a;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .card {
        width: 340px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 18px;
        padding: 28px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
        backdrop-filter: blur(20px);
      }
      .logo {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        color: white;
        background: #2563eb;
        font-weight: 700;
      }
      .title {
        margin-top: 22px;
        font-size: 20px;
        font-weight: 700;
      }
      .status {
        margin-top: 8px;
        font-size: 14px;
        color: #475569;
      }
      .bar {
        margin-top: 24px;
        height: 6px;
        overflow: hidden;
        border-radius: 999px;
        background: #dbeafe;
      }
      .bar::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: #2563eb;
        animation: load 1.2s ease-in-out infinite;
      }
      @keyframes load {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(260%); }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo">AE</div>
      <div class="title" id="title">Starting system...</div>
      <div class="status" id="detail">Preparing local services...</div>
      <div class="bar"></div>
    </main>
    <script>
      window.automationDesktop?.onStartupStatus?.((payload) => {
        document.getElementById("title").textContent = payload.title || "Starting system...";
        document.getElementById("detail").textContent = payload.detail || "";
      });
    </script>
  </body>
</html>
